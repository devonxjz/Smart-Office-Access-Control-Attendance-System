name: Dashboard CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'dashboard/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main", "develop"]
    paths:
      - 'dashboard/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: ./dashboard/dist
          retention-days: 7